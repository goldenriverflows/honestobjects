<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Honest Objects</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #f6efe3;
    font-family: Helvetica, Arial, sans-serif;
    color: #111;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* subtle paper grain */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      radial-gradient(#000 0.5px, transparent 0.5px);
    background-size: 4px 4px;
    pointer-events: none;
  }

  h1 {
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 500;
    letter-spacing: -0.05em;
    z-index: 1;
  }

  nav {
    margin-top: 1rem;
    display: flex;
    gap: 2rem;
    z-index: 1;
  }

  a {
    font-size: 1rem;
    color: #555;
    text-decoration: none;
  }

  a:hover {
    opacity: 0.6;
  }
</style>
</head>

<body>
  <h1>Honest Objects</h1>

  <nav>
    <a href="Blog.html">Blog</a>
    <a href="#">Projects</a>
  </nav>
</body>
</html>
