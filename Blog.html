<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blog — Honest Objects</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f6efe3;
    color: #111;
    font-family: Helvetica, Arial, sans-serif;
    padding: 4rem 1.5rem;
    line-height: 1.4;
  }

  .container {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 500;
    letter-spacing: -0.05em;
    margin-bottom: 3rem;
  }

  .post {
    display: flex;
    justify-content: space-between;
    gap: 2rem;
    padding: 0.9rem 0;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }

  .title {
    color: #111;
    text-decoration: none;
  }

  .title:hover {
    opacity: 0.6;
  }

  .date {
    color: #777;
    white-space: nowrap;
    font-size: 0.95rem;
  }

  @media (max-width: 640px) {
    .post {
      flex-direction: column;
      gap: 0.3rem;
    }

    .date {
      font-size: 0.9rem;
    }
  }
</style>
</head>

<body>
  <div class="container">

    <h1>Blog</h1>

    <div class="post">
